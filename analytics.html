<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الأداء التفصيلي | Tawal Academy</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="stylesheet" href="style.css?v=24.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --easy-color: #2ecc71;
            --medium-color: #f1c40f;
            --hard-color: #e74c3c;
        }
        body.dark-mode {
            --glass-bg: rgba(30, 30, 40, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .analytics-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            animation: fadeIn 0.6s ease;
        }
        .analytics-card {
            background: var(--bg-secondary-color);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .result-header {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            align-items: center;
        }
        @media (min-width: 768px) {
            .result-header { grid-template-columns: 300px 1fr; }
        }
        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 200px;
            max-height: 250px;
        }
        .circle-bg { fill: none; stroke: var(--border-color); stroke-width: 2.5; }
        .circle { 
            fill: none; 
            stroke-width: 2.5; 
            stroke-linecap: round; 
            animation: progress 1.5s ease-out forwards;
        }
        .percentage { 
            fill: var(--text-color); 
            font-family: 'Cairo', sans-serif; 
            font-weight: bold; 
            font-size: 0.5em; 
            text-anchor: middle; 
        }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .score-details h2 { margin-bottom: 0.5rem; font-size: 2rem; }
        .score-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            margin-bottom: 1rem;
        }
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .mini-stat-box {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .deep-analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .progress-container { margin-bottom: 1.2rem; }
        .progress-label {
            display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;
        }
        .progress-bar-bg {
            width: 100%; height: 8px; background: var(--bg-color); border-radius: 10px; overflow: hidden;
        }
        .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
        .topic-badges {
            display: flex; flex-wrap: wrap; gap: 10px;
        }
        .topic-badge {
            flex: 1 1 auto;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid transparent;
            background: var(--bg-color);
            transition: transform 0.2s;
            min-width: 150px;
        }
        .topic-badge:hover { transform: translateY(-3px); }
        .mistake-card {
            background: var(--bg-secondary-color);
            border-right: 4px solid var(--color-incorrect);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .mistake-meta {
            display: flex; gap: 10px; margin-bottom: 10px; font-size: 0.8rem; flex-wrap: wrap;
        }
        .meta-tag {
            padding: 2px 8px; border-radius: 4px; background: var(--bg-color); border: 1px solid var(--border-color);
        }
        .rec-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border: 1px solid var(--primary-color);
            padding: 1rem;
            border-radius: 10px;
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1rem;
        }
        .action-bar {
            display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 3rem;
        }
        .empty-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-color-light);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="main-header">
            <h1 class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4"><path d="M40 8H8c-2.21 0-4 1.79-4 4v24c0 2.21 1.79 4 4 4h32c2.21 0 4-1.79 4-4V12c0-2.21-1.79-4-4-4z" fill="currentColor"/><path d="M18 20l6 12 6-12" stroke="white" stroke-width="2"/><line x1="16" y1="20" x2="32" y2="20" stroke="white" stroke-width="2"/></svg>
                Tawal Academy
            </h1>
            <div class="header-controls">
                <a href="index.html" class="dashboard-link" title="الرئيسية">🏠</a>
                <button id="theme-toggle-btn" class="theme-toggle-btn">🌗</button>
            </div>
        </header>

        <main class="analytics-container" id="report-container">
            <div style="text-align: center; padding: 4rem;">
                <div class="spinner"></div>
                <p>جاري تحليل البيانات...</p>
            </div>
        </main>
    </div>

    <script>
        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle-btn');
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        };

        // Generate Report
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(generateReport, 500);
        });

        function generateReport() {
            const container = document.getElementById('report-container');
            const rawData = localStorage.getItem('quiz_result_data');

            if (!rawData) {
                container.innerHTML = `
                    <div class="analytics-card" style="text-align:center">
                        <div style="font-size:4rem">📊</div>
                        <h2>لا توجد بيانات متاحة</h2>
                        <p>قم بإجراء اختبار أولاً ليظهر التحليل هنا.</p>
                        <a href="index.html" class="card-btn btn-quiz">الذهاب للاختبارات</a>
                    </div>`;
                return;
            }

            const data = JSON.parse(rawData);
            const score = data.score || 0;
            const detailed = data.detailedAnalysis || { byDifficulty: {}, byCategory: {} };

            let strokeColor = score >= 90 ? '#2ecc71' : score >= 75 ? '#3498db' : score >= 50 ? '#f1c40f' : '#e74c3c';
            let message = score >= 90 ? 'أداء أسطوري! 👑' : score >= 75 ? 'ممتاز جداً 🌟' : score >= 50 ? 'جيد، استمر 💪' : 'تحتاج لمزيد من التركيز 📚';

            let html = `
                <div class="analytics-card result-header">
                    <div style="text-align:center;">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" stroke-dasharray="${score}, 100" stroke="${strokeColor}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage">${score}%</text>
                        </svg>
                    </div>
                    <div class="score-details">
                        <span class="score-tag">${data.quizName || 'اختبار'}</span>
                        <h2 style="color:${strokeColor}">${message}</h2>
                        <p style="color:var(--text-color-light)">تم الانتهاء في ${formatTime(data.timeTaken || 0)}</p>
                        
                        <div class="mini-stats">
                            <div class="mini-stat-box">
                                <div style="font-weight:bold; font-size:1.2rem;">${data.total || 0}</div>
                                <div style="font-size:0.8rem; opacity:0.7">الأسئلة</div>
                            </div>
                            <div class="mini-stat-box" style="border-color:var(--color-correct)">
                                <div style="font-weight:bold; font-size:1.2rem; color:var(--color-correct)">${data.correct || 0}</div>
                                <div style="font-size:0.8rem; opacity:0.7">صحيحة</div>
                            </div>
                            <div class="mini-stat-box" style="border-color:var(--color-incorrect)">
                                <div style="font-weight:bold; font-size:1.2rem; color:var(--color-incorrect)">${(data.wrong || []).length}</div>
                                <div style="font-size:0.8rem; opacity:0.7">خاطئة</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="deep-analysis-grid">
                    
                    <div class="analytics-card">
                        <h3 style="margin-bottom:1.5rem; display:flex; align-items:center; gap:10px;">
                            <span>🧠</span> تحليل مستوى الصعوبة
                        </h3>
                        ${renderDifficultyBar('سهل (Easy)', detailed.byDifficulty.easy, 'var(--easy-color)')}
                        ${renderDifficultyBar('متوسط (Medium)', detailed.byDifficulty.medium, 'var(--medium-color)')}
                        ${renderDifficultyBar('صعب (Hard)', detailed.byDifficulty.hard, 'var(--hard-color)')}
                        ${Object.keys(detailed.byDifficulty).length === 0 ? '<p style="text-align:center; color:#777">لا توجد بيانات صعوبة متاحة</p>' : ''}
                    </div>

                    <div class="analytics-card">
                        <h3 style="margin-bottom:1.5rem; display:flex; align-items:center; gap:10px;">
                            <span>📚</span> إتقان المواضيع
                        </h3>
                        <div class="topic-badges">
                            ${renderTopicBadges(detailed.byCategory)}
                        </div>
                    </div>
                </div>

                <div class="analytics-card">
                    <h3 style="margin-bottom:1.5rem; color:var(--color-incorrect); display:flex; align-items:center; gap:10px;">
                        <span>❌</span> مراجعة الأخطاء
                    </h3>
                    ${(data.wrong || []).length === 0 
                        ? `<div class="empty-message">
                            <div style="font-size:3rem;">🎉</div>
                            <p>أحسنت! لا توجد أي أخطاء.</p>
                           </div>` 
                        : (data.wrong || []).map((w, i) => `
                            <div class="mistake-card">
                                <div class="mistake-meta">
                                    <span class="meta-tag">📂 ${w.category || 'عام'}</span>
                                    <span class="meta-tag" style="border-color:${getDiffColor(w.difficulty)}; color:${getDiffColor(w.difficulty)}">
                                        ${w.difficulty === 'hard' ? '🔥 صعب' : w.difficulty === 'easy' ? '🟢 سهل' : '⚖️ متوسط'}
                                    </span>
                                </div>
                                <p style="font-weight:bold; margin-bottom:0.8rem; font-size:1.05rem;">${i+1}. ${w.question}</p>
                                <div style="display:flex; flex-direction:column; gap:0.5rem;">
                                    <div style="background:rgba(46, 204, 113, 0.1); padding:0.8rem; border-radius:8px; border:1px solid var(--color-correct); color:var(--color-correct); font-weight:bold;">
                                        ✅ الإجابة الصحيحة: ${w.correctAnswer}
                                    </div>
                                </div>
                            </div>
                        `).join('')
                    }
                </div>

                <div class="analytics-card">
                    <h3 style="margin-bottom:1.5rem; display:flex; align-items:center; gap:10px;">
                        <span>💡</span> توصيات الذكاء الاصطناعي
                    </h3>
                    ${generateRecommendations(score, detailed, data).map(rec => `
                        <div class="rec-item">
                            <span style="font-size:1.5rem">${rec.icon}</span>
                            <span>${rec.text}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="action-bar">
                    <a href="quiz.html?subject=${data.subject || 'gis_networks'}" class="card-btn btn-quiz">🔄 إعادة الاختبار</a>
                    <a href="summary.html?subject=${data.subject || 'gis_networks'}" class="card-btn btn-summary">📖 المذاكرة</a>
                    <a href="index.html" class="card-btn" style="background:transparent; border:1px solid var(--text-color)">🏠 الرئيسية</a>
                </div>
            `;

            container.innerHTML = html;
        }

        // Helper Functions

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m > 0 ? `${m} دقيقة و ${s} ثانية` : `${s} ثانية`;
        }

        function getDiffColor(diff) {
            if(diff === 'easy') return 'var(--easy-color)';
            if(diff === 'hard') return 'var(--hard-color)';
            return 'var(--medium-color)';
        }

        function renderDifficultyBar(label, stats, color) {
            if(!stats || stats.total === 0) return '';
            const pct = Math.round((stats.correct / stats.total) * 100);
            return `
                <div class="progress-container">
                    <div class="progress-label">
                        <span>${label}</span>
                        <span>${stats.correct}/${stats.total} (${pct}%)</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width:${pct}%; background:${color}"></div>
                    </div>
                </div>
            `;
        }

        function renderTopicBadges(categories) {
            if(!categories || Object.keys(categories).length === 0) {
                return '<p style="color:#777; text-align:center; padding:1rem;">لا توجد بيانات مواضيع</p>';
            }
            
            return Object.entries(categories).map(([cat, stats]) => {
                const pct = Math.round((stats.correct / stats.total) * 100);
                let color = pct >= 80 ? 'var(--easy-color)' : pct >= 50 ? 'var(--medium-color)' : 'var(--hard-color)';
                let bg = pct >= 80 ? 'rgba(46, 204, 113, 0.1)' : pct >= 50 ? 'rgba(241, 196, 15, 0.1)' : 'rgba(231, 76, 60, 0.1)';
                return `
                    <div class="topic-badge" style="background:${bg}; border-color:${color}; color:${color}">
                        <div style="font-size:0.85rem; opacity:0.9; margin-bottom:0.3rem;">${cat}</div>
                        <div style="font-weight:bold; font-size:1.2rem;">${pct}%</div>
                        <div style="font-size:0.7rem; opacity:0.7;">${stats.correct}/${stats.total}</div>
                    </div>
                `;
            }).join('');
        }

        function generateRecommendations(score, detailed, data) {
            let tips = [];
            
            // توصيات الدرجة
            if(score === 100) {
                tips.push({icon:'👑', text:'مستواك مثالي! أنت جاهز تماماً للامتحان الفعلي.'});
            } else if(score >= 90) {
                tips.push({icon:'🌟', text:'أداء ممتاز! راجع الأخطاء القليلة وستكون مستعداً 100%.'});
            } else if(score >= 75) {
                tips.push({icon:'💪', text:'أداء جيد جداً! ركز على المواضيع الضعيفة لتصل للامتياز.'});
            } else if(score >= 50) {
                tips.push({icon:'📚', text:'تحتاج لمراجعة أعمق. ابدأ بالملخصات ثم أعد الاختبار.'});
            } else {
                tips.push({icon:'⚠️', text:'الدرجة منخفضة. راجع المادة كاملة قبل المحاولة القادمة.'});
            }

            // توصيات الصعوبة
            const easy = detailed.byDifficulty.easy;
            if(easy && easy.total > 0 && easy.correct < easy.total) {
                tips.push({icon:'🔍', text:'لديك أخطاء في الأسئلة السهلة. تمهل ولا تتسرع في الإجابة.'});
            }
            const hard = detailed.byDifficulty.hard;
            if(hard && hard.total > 0 && (hard.correct / hard.total) < 0.5) {
                tips.push({icon:'🔥', text:'الأسئلة الصعبة تحتاج تدريب أكثر. راجع الأمثلة المتقدمة.'});
            }

            // توصيات الوقت
            const avgTime = Math.round((data.timeTaken || 0) / (data.total || 1));
            if(avgTime < 10) {
                tips.push({icon:'⏱️', text:`متوسط ${avgTime} ثانية/سؤال سريع جداً. خذ وقتك في القراءة.`});
            }

            // توصية عامة
            if((data.wrong || []).length > 0) {
                tips.push({icon:'💡', text:'راجع الأخطاء أعلاه - هذه أسرع طريقة للتعلم!'});
            }

            return tips.length > 0 ? tips : [{icon:'✅', text:'استمر في التدريب والمراجعة!'}];
        }
    </script>
</body>
</html>
